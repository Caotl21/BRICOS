name: GCC_Build

on:
  push:
    branches: ["dev_scons"]
  pull_request:
    branches: ["test_scons"]
  workflow_dispatch:
    inputs:
      startup_led_probe:
        description: "Enable GPIOE.2 blink probe at the beginning of Reset_Handler"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi python3-pip
          python3 -m pip install scons

      - name: Build APP1 Firmware
        run: scons BUILD=release

      - name: Show ELF Size
        run: arm-none-eabi-size build/gcc/app1/release/app1

      - name: Show APP1 Vector Header
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import struct

          data = Path("build/gcc/app1/release/app1.bin").read_bytes()
          print(f"app1.bin size: {len(data)} bytes")
          for i in range(16):
              word = struct.unpack_from("<I", data, i * 4)[0]
              print(f"[{i:02d}] 0x{word:08X}")
          PY

      - name: Show APP1 Usage
        run: cat build/gcc/app1/release/app1_usage.txt

      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bricsbot-app1-gcc
          path: |
            build/gcc/app1/release/app1
            build/gcc/app1/release/app1.bin
            build/gcc/app1/release/app1.map
            build/gcc/app1/release/app1_usage.txt
            build/gcc/app1/release/app1_usage.env

      - name: Generate Release Metadata
        if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        id: meta
        shell: bash
        run: |
          source build/gcc/app1/release/app1_usage.env
          tag="gcc-v$(date +'%Y.%m.%d')-${{ github.run_number }}"
          build_time="$(date +'%Y-%m-%d %H:%M:%S UTC')"
          commit_sha="${{ github.sha }}"
          commit_subject="$(git log -1 --pretty=%s)"
          echo "tag_name=$tag" >> "$GITHUB_OUTPUT"
          echo "build_time=$build_time" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"
          echo "commit_subject=$commit_subject" >> "$GITHUB_OUTPUT"
          echo "flash_used_bytes=$APP1_FLASH_USED_BYTES" >> "$GITHUB_OUTPUT"
          echo "flash_limit_bytes=$APP1_FLASH_LIMIT_BYTES" >> "$GITHUB_OUTPUT"
          echo "flash_remaining_bytes=$APP1_FLASH_REMAINING_BYTES" >> "$GITHUB_OUTPUT"
          echo "flash_used_percent=$APP1_FLASH_USED_PERCENT" >> "$GITHUB_OUTPUT"
          echo "ram_used_bytes=$APP1_RAM_USED_BYTES" >> "$GITHUB_OUTPUT"
          echo "ram_limit_bytes=$APP1_RAM_LIMIT_BYTES" >> "$GITHUB_OUTPUT"
          echo "ram_remaining_bytes=$APP1_RAM_REMAINING_BYTES" >> "$GITHUB_OUTPUT"
          echo "ram_used_percent=$APP1_RAM_USED_PERCENT" >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: Release ${{ steps.meta.outputs.tag_name }}
          body: |
            BRICOS GCC + SCons 自动构建发布
            - Commit: ${{ steps.meta.outputs.commit_sha }}
            - Message: ${{ steps.meta.outputs.commit_subject }}
            - Build Time: ${{ steps.meta.outputs.build_time }}
            - APP1 FLASH: ${{ steps.meta.outputs.flash_used_bytes }} / ${{ steps.meta.outputs.flash_limit_bytes }} bytes (${{ steps.meta.outputs.flash_used_percent }}%), remaining ${{ steps.meta.outputs.flash_remaining_bytes }} bytes
            - APP1 RAM: ${{ steps.meta.outputs.ram_used_bytes }} / ${{ steps.meta.outputs.ram_limit_bytes }} bytes (${{ steps.meta.outputs.ram_used_percent }}%), remaining ${{ steps.meta.outputs.ram_remaining_bytes }} bytes
          draft: false
          prerelease: false
          files: |
            build/gcc/app1/release/app1
            build/gcc/app1/release/app1.bin
            build/gcc/app1/release/app1.map
            build/gcc/app1/release/app1_usage.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
