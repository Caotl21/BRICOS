name: Auto_Build

on:
  push:
    branches: [ "CICD_test" ]
  pull_request:
    branches: [ "CICD_test" ]

jobs:
  build_job:
    # 关键点：指定在你自己的电脑上运行
    runs-on: self-hosted

    steps:
      # 把 GitHub 上的代码拉取到你电脑的临时目录
      - name: Checkout Code
        uses: actions/checkout@v4

      # 运行编译脚本
      - name: Run Keil Build
        run: python tools/build_firmware.py

      - name: Pick latest build output
        id: pick
        shell: pwsh
        run: |
          $latest = Get-ChildItem Build -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $latest) { throw "No Build/<timestamp> folder found." }

          $bin = Join-Path $latest.FullName "app.bin"
          $log = Join-Path $latest.FullName "build.log"
          if (-not (Test-Path $bin)) { throw "app.bin not found in $($latest.FullName)" }

          "bin_path=$bin" >> $env:GITHUB_OUTPUT
          if (Test-Path $log) { "log_path=$log" >> $env:GITHUB_OUTPUT}

      # 如果编译成功，把生成的固件文件上传到 GitHub 网页方便下载
      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Bricsbot_Firmware
          path: |
             ${{ steps.pick.outputs.bin_path }}

      # 生成一个基于日期和运行次数的 Tag 名 (例如 v2024.04.11-1)
      - name: Generate Tag Name
        if: success() && github.event_name == 'push'
        id: tag
        run: |
          echo "tag_name=v$(date +'%Y.%m.%d')-${{ github.run_number }}" >> $GITHUB_OUTPUT
        shell: bash

      # 自动创建 Release 并上传文件
      - name: Create Release
        if: success() && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: Release ${{ steps.tag.outputs.tag_name }}
          body: |
            Bricsbot 自动编译发布
            - 提交信息: ${{ github.event.head_commit.message }}
            - 编译时间: $(date +'%Y-%m-%d %H:%M:%S')
          draft: false
          prerelease: false
          files: |
            ${{ steps.pick.outputs.bin_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}